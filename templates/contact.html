{% extends 'base.html' %}

{% block title %}Contact | FLUFFY{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="neon-card p-5">

                <div class="text-center mb-5">

                    <h2>Contact Us</h2>

                    <p class="text-muted">
                        Send us your message anytime.
                    </p>
                    <a href="https://t.me/fluffyspp24l7" target="_blank" class="btn btn-outline-light mt-3"> <i class="bi bi-telegram"></i>
                        Contact on Telegram </a>

                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Name</label>

                            <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>

                            <input type="email" name="email" class="form-control" placeholder="Enter your email"
                                required>
                        </div>

                    </div>

                    
                    <div class="mb-4">

                        <label class="form-label">Message</label>

                        <textarea name="message" rows="6" class="form-control" placeholder="Write your message..."
                            required></textarea>

                    </div>

                    <button class="btn btn-primary w-100">
                        Send Message
                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
