{% extends 'base.html' %}

{% block title %}Dashboard | FLUFFY{% endblock %}

{% block content %}

<section class="container py-5">

    <div class="row g-4">

        <div class="col-lg-3">

            <div class="sidebar-box">

                <h5 class="mb-4">My Account</h5>

                <a href="{% url 'dashboard' %}" class="d-block text-light text-decoration-none mb-3">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>

                <a href="{% url 'order_history' %}" class="d-block  text-decoration-none mb-3">
                    <i class="bi bi-bag-check me-2"></i> Orders
                </a>

                <a href="{% url 'products' %}" class="d-block text-decoration-none mb-3">
                    <i class="bi bi-heart me-2"></i> Wishlist
                </a>

                <a href="{% url 'logout' %}" class="d-block text-danger text-decoration-none">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </a>

            </div>

        </div>

        <div class="col-lg-9">

            <div class="neon-card p-4 mb-4">

                <h2>Hello, {{ user.username }} 👋</h2>

                <p class="text-muted mb-0">
                    Welcome to your account dashboard.
                </p>

            </div>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="neon-card p-4 text-center">
                        <i class="bi bi-bag-check fs-1 text-primary"></i>
                        <h3 class="mt-3">Orders</h3>
                        <p class="text-muted mb-0">Track your orders</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="neon-card p-4 text-center">
                        <i class="bi bi-heart fs-1 text-danger"></i>
                        <h3 class="mt-3">Wishlist</h3>
                        <p class="text-muted mb-0">Saved products</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="neon-card p-4 text-center">
                        <i class="bi bi-person fs-1 text-success"></i>
                        <h3 class="mt-3">Profile</h3>
                        <p class="text-muted mb-0">Manage account</p>
                    </div>
                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
